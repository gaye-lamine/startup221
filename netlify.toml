# ─── Netlify Configuration for Startup221 Monorepo ───────────────────────────

[build]
  base    = "frontend"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION             = "20"
  NEXT_TELEMETRY_DISABLED  = "1"
  NEXT_PUBLIC_API_URL      = "https://startup.backnd-api.cloud"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
