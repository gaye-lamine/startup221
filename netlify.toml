# ─── Netlify Configuration for Startup221 Frontend ───────────────────────────
# Next.js 14 App Router via @netlify/plugin-nextjs

[build]
  # Monorepo: build from the frontend subdirectory
  base    = "frontend"
  command = "npm run build"
  # @netlify/plugin-nextjs requires publish = ".next"
  publish = ".next"

[build.environment]
  NODE_VERSION             = "20"
  NEXT_TELEMETRY_DISABLED  = "1"

# ─── Next.js Plugin ───────────────────────────────────────────────────────────
# Handles SSR, API routes, image optimization, and routing automatically.
# Do NOT add manual [[redirects]] for /* — the plugin manages all routing.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ─── Security Headers ─────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
