# ─── Netlify Configuration for Startup221 Frontend ───────────────────────────
# Next.js App Router deployed via @netlify/plugin-nextjs

[build]
  # Build from the frontend subdirectory of the monorepo
  base    = "frontend"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION        = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# ─── Next.js Plugin (SSR + ISR + API routes support) ─────────────────────────
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ─── Redirects ────────────────────────────────────────────────────────────────
# Let Next.js handle all routing — catch-all redirect
[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/___netlify-handler"
  status = 200

# ─── Headers ──────────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Edge Functions (optionnel, pour futures optimisations) ───────────────────
# [edge_functions]
#   /api/* = "edge-handler"
